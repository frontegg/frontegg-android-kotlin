name: "onPullRequestUpdated"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - master

env:
  CI: true
  LANG: en_US.UTF-8
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-pr:
    name: Validate PR Description
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get Pull Request Description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_metadata=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
           -H "Accept: application/vnd.github+json" \
           "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}")

          # Extract the description (body field)
          DESCRIPTION=$(echo "$pr_metadata" | jq -r '.body')

          if [ "$DESCRIPTION" != "null" ]; then
            echo "Pull Request Description: $DESCRIPTION"
          else
            echo "No description provided in the pull request. The 'release/next' branch must provide a description for the correct generation of the 'CHANGELOG.md' file."
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create properties files
        shell: bash
        run: |
          cat <<EOF > frontegg.properties
          FRONTEGG_DOMAIN=${{ secrets.FRONTEGG_DOMAIN }}
          FRONTEGG_CLIENT_ID=${{ secrets.FRONTEGG_CLIENT_ID }}
          FRONTEGG_APPLICATION_ID=${{ secrets.FRONTEGG_APPLICATION_ID }}
          EOF

      - name: Run Detekt Check
        run: ./gradlew :android:detektDebug --no-daemon

      - name: Run Unit Tests
        run: ./gradlew :android:testDebugUnitTest --no-daemon
        # jacocoTestReport is finalizedBy testDebugUnitTest and runs even when some tests fail

      - name: Coverage summary (step summary)
        if: always()
        run: |
          if [ -f android/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            python3 .github/scripts/jacoco_folder_summary.py android/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Code coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "JaCoCo XML not found (tests may have failed before coverage was written)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: android/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-android
          path: |
            android/build/reports/jacoco/jacocoTestReport/
          retention-days: 7